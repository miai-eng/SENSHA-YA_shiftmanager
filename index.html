<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent2: #ff5c5c;
    --text: #f0f0f0;
    --muted: #666;
    --off-bg: #2a1a1a;
    --off-text: #ff5c5c;
    --shift-bg: #1a2a1a;
    --shift-text: #7eff7e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .mode-toggle {
    display: flex;
    background: var(--bg);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 500;
  }

  .btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { opacity: 0.85; color: #000; }
  .btn.danger { border-color: var(--accent2); color: var(--accent2); }

  .main { padding: 20px 16px; max-width: 100%; overflow-x: auto; }

  /* Week navigation */
  .week-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .week-nav h2 {
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
  }

  .week-range-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .week-chip {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    background: var(--surface);
    transition: all 0.15s;
  }

  .week-chip.active { border-color: var(--accent); color: var(--accent); background: #1f2200; }

  /* Table */
  .table-wrap { overflow-x: auto; }

  table {
    border-collapse: collapse;
    min-width: 700px;
    width: 100%;
  }

  th {
    background: var(--surface2);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    padding: 8px 10px;
    text-align: center;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  th.name-col { text-align: left; min-width: 100px; }
  th.today { color: var(--accent); border-bottom: 2px solid var(--accent); }

  td {
    border: 1px solid var(--border);
    padding: 4px 6px;
    text-align: center;
    vertical-align: middle;
    font-size: 13px;
  }

  td.name-cell {
    text-align: left;
    font-weight: 500;
    font-size: 13px;
    padding: 6px 10px;
    white-space: nowrap;
    background: var(--surface);
  }

  tr:hover td { background: #1e1e1e; }
  tr:hover td.name-cell { background: #242424; }

  .cell-off {
    background: var(--off-bg);
    color: var(--off-text);
    font-weight: 700;
    font-size: 12px;
    border-radius: 3px;
    padding: 2px 6px;
    font-family: 'DM Mono', monospace;
  }

  .cell-shift {
    background: var(--shift-bg);
    color: var(--shift-text);
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    border-radius: 3px;
    padding: 2px 6px;
  }

  .cell-empty {
    color: var(--muted);
    font-size: 11px;
  }

  /* Editable cell */
  .shift-input {
    width: 72px;
    background: #111;
    border: 1px solid var(--accent);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 3px 6px;
    border-radius: 4px;
    text-align: center;
    outline: none;
  }

  /* Staff view */
  .staff-search-wrap {
    max-width: 360px;
    margin: 0 auto 24px;
  }

  .staff-search {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    font-family: 'Noto Sans JP', sans-serif;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  .staff-search:focus { border-color: var(--accent); }

  .staff-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto;
  }

  .staff-card h3 {
    font-size: 20px;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .staff-week { margin-bottom: 20px; }
  .staff-week h4 {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .staff-days { display: flex; flex-direction: column; gap: 4px; }

  .staff-day {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 6px;
    font-size: 14px;
  }

  .staff-day .day-label {
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    font-size: 12px;
    width: 80px;
  }

  .staff-day.today-row { border-left: 2px solid var(--accent); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal h3 { margin-bottom: 16px; font-size: 16px; }

  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .form-group input {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
  }

  .form-group input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

  /* Summary bar */
  .summary-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .summary-chip {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
  }

  .summary-chip span { color: var(--text); }

  /* Print styles */
  @media print {
    body { background: #fff; color: #000; }
    header, .week-nav .btn, .header-controls, .week-range-list { display: none !important; }
    th { background: #eee !important; color: #333 !important; }
    td { border-color: #ccc !important; }
    .cell-off { color: red !important; background: #fff0f0 !important; }
    .cell-shift { color: #006600 !important; background: #f0fff0 !important; }
    .main { padding: 0; }
  }

  .empty-hint {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .requests-cell {
    font-size: 11px;
    color: var(--muted);
    max-width: 100px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>

<header>
  <div class="logo">SHIFT MGR</div>
  <div class="header-controls">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('admin')" id="btn-admin">管理者</button>
      <button class="mode-btn" onclick="setMode('staff')" id="btn-staff">スタッフ</button>
    </div>
    <button class="btn" onclick="openAddStaff()">＋ スタッフ追加</button>
    <button class="btn" onclick="exportCSV()">CSV出力</button>
    <button class="btn" onclick="window.print()">印刷</button>
  </div>
</header>

<div class="main" id="main-content"></div>

<!-- Add/Edit Staff Modal -->
<div class="modal-overlay" id="staff-modal">
  <div class="modal">
    <h3 id="modal-title">スタッフ追加</h3>
    <div class="form-group">
      <label>名前</label>
      <input type="text" id="input-name" placeholder="Mia">
    </div>
    <div class="form-group">
      <label>電話番号</label>
      <input type="tel" id="input-phone" placeholder="236-123-4567">
    </div>
    <div class="form-group">
      <label>休み希望メモ</label>
      <input type="text" id="input-requests" placeholder="例: 毎週日曜, 5/10-5/15">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" onclick="saveStaff()">保存</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const STORAGE_KEY = 'shiftmgr_v2';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { staff: [], shifts: {} };
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

let appData = loadData();
let currentMode = 'admin';
let currentWeekStart = getThisMonday();
let editingStaffId = null;

// Seed demo data if empty
if (appData.staff.length === 0) {
  appData.staff = [
    { id: 's1', name: 'KIRILL', phone: '778-895-7701', requests: '' },
    { id: 's2', name: 'JUN', phone: '236-335-7001', requests: '' },
    { id: 's3', name: 'CEDRIC', phone: '604-618-8654', requests: 'SUNDAYS NA' },
    { id: 's4', name: 'KOU', phone: '604-600-1307', requests: '' },
    { id: 's5', name: 'SHIORI', phone: '236-785-0374', requests: '' },
    { id: 's6', name: 'TOMOYA', phone: '672-965-3956', requests: '' },
    { id: 's7', name: 'MIKIYA', phone: '778-302-3594', requests: '6/15-5/6' },
    { id: 's8', name: 'YUYA', phone: '236-333-3260', requests: '' },
    { id: 's9', name: 'TAIYO', phone: '604-616-2652', requests: '' },
    { id: 's10', name: 'Yutaro', phone: '672-993-6737', requests: '232425' },
    { id: 's11', name: 'Mia', phone: '236-331-5017', requests: '19-23, June 1-2+' },
    { id: 's12', name: 'MAAYA', phone: '672-729-3452', requests: '' },
    { id: 's13', name: 'Baichen', phone: '604-652-0857', requests: '4/27' },
    { id: 's14', name: 'NAMIKI', phone: '236-992-1904', requests: '' },
    { id: 's15', name: 'KAZUKI', phone: '778-531-5627', requests: '' },
    { id: 's16', name: 'HINAKO', phone: '778-229-3175', requests: '' },
    { id: 's17', name: 'SHIN', phone: '287-334-8347', requests: '' },
    { id: 's18', name: 'Yusuke', phone: '236-268-5217', requests: '24' },
    { id: 's19', name: 'Jun', phone: '778-238-7355', requests: '' },
    { id: 's20', name: 'Yuto', phone: '236-662-6392', requests: '' },
    { id: 's21', name: 'Maruto', phone: '236-969-8532', requests: '' },
  ];

  // Seed some shifts for current week
  const monday = getThisMonday();
  const staffShifts = {
    's1': ['9','9','9','9','9','9','-'],
    's2': ['9','9','9','9','OFF','9','OFF'],
    's3': ['9','9','OFF','9','9','OFF','9'],
    's4': ['9','OFF','9','9','9','OFF','11'],
    's5': ['9','OFF','9','9','9','9','-'],
    's6': ['1','OFF','9','10','9','OFF','10'],
    's7': ['OFF','9','9','OFF','9','9','9'],
    's8': ['OFF','OFF','OFF','11','10','OFF','-'],
    's9': ['','OFF','OFF','','11','OFF','OFF'],
    's10': ['OFF','11','11','OFF','OFF','1','1'],
    's11': ['OFF','1','11','1','11','11','OFF'],
    's12': ['OFF','9','10','OFF','11','9','OFF'],
    's13': ['OFF','OFF','OFF','','11','9','OFF'],
    's14': ['11','9','OFF','','OFF','',''],
    's15': ['','','OFF','10','OFF','10','OFF'],
    's16': ['','','','','OFF','10','9'],
    's17': ['OFF','OFF','3','3','OFF','','9'],
    's18': ['OFF','10','OFF','9','OFF','9','OFF'],
    's19': ['','','OFF','OFF','OFF','OFF','10'],
    's20': ['','','','','OFF','OFF','OFF'],
    's21': ['','OFF','','','','11','1'],
  };

  const days = ['mon','tue','wed','thu','fri','sat','sun'];
  for (const [sid, shifts] of Object.entries(staffShifts)) {
    shifts.forEach((val, i) => {
      if (val) {
        const d = new Date(monday);
        d.setDate(d.getDate() + (i === 6 ? 6 : i === 3 ? 3 : i === 4 ? 4 : i === 5 ? 5 : i));
        const key = shiftKey(sid, d);
        appData.shifts[key] = val;
      }
    });
  }
  saveData();
}

// ==================== DATE UTILS ====================
function getThisMonday() {
  const today = new Date();
  const d = new Date(today);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDays(monday) {
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function fmtDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function fmtDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function shiftKey(staffId, date) {
  return `${staffId}_${fmtDateKey(date)}`;
}

function isToday(d) {
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

// Generate week list (8 weeks back + 4 weeks forward)
function getWeekList() {
  const now = getThisMonday();
  const weeks = [];
  for (let i = -7; i <= 3; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i * 7);
    weeks.push(d);
  }
  return weeks;
}

// ==================== RENDER ====================
function render() {
  if (currentMode === 'admin') renderAdmin();
  else renderStaff();
}

function renderAdmin() {
  const days = getWeekDays(currentWeekStart);
  const DAY_LABELS = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];
  const weeks = getWeekList();
  const todayMs = new Date().setHours(0,0,0,0);

  let html = `
    <div class="week-nav">
      <h2>週を選択</h2>
      <button class="btn" onclick="prevWeek()">◀</button>
      <button class="btn" onclick="nextWeek()">▶</button>
      <button class="btn" onclick="goToday()">今週</button>
      <div class="week-range-list">
        ${weeks.map(w => {
          const wEnd = new Date(w); wEnd.setDate(w.getDate()+6);
          const active = w.getTime() === currentWeekStart.getTime() ? 'active' : '';
          return `<button class="week-chip ${active}" onclick="gotoWeek(${w.getTime()})">${fmtDate(w)}〜${fmtDate(wEnd)}</button>`;
        }).join('')}
      </div>
    </div>`;

  // Summary
  let totalShifts = 0;
  const staffWithShifts = new Set();
  days.forEach(d => {
    appData.staff.forEach(s => {
      const v = appData.shifts[shiftKey(s.id, d)];
      if (v && v !== 'OFF' && v !== '-') { totalShifts++; staffWithShifts.add(s.id); }
    });
  });

  html += `<div class="summary-bar">
    <div class="summary-chip">スタッフ数: <span>${appData.staff.length}</span></div>
    <div class="summary-chip">今週シフト数: <span>${totalShifts}</span></div>
    <div class="summary-chip">週: <span>${fmtDate(days[0])} 〜 ${fmtDate(days[6])}</span></div>
  </div>`;

  html += `<div class="table-wrap"><table>
    <thead><tr>
      <th class="name-col">名前</th>
      <th>電話番号</th>
      <th>休み希望</th>
      ${DAY_LABELS.map((l,i) => {
        const isTod = isToday(days[i]);
        return `<th class="${isTod?'today':''}">${l}<br><span style="font-size:11px;opacity:0.7">${fmtDate(days[i])}</span></th>`;
      }).join('')}
      <th>操作</th>
    </tr></thead>
    <tbody>`;

  appData.staff.forEach(s => {
    html += `<tr>
      <td class="name-cell">${s.name}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${s.phone || '—'}</td>
      <td class="requests-cell" title="${s.requests||''}">${s.requests || '—'}</td>`;

    days.forEach(d => {
      const key = shiftKey(s.id, d);
      const val = appData.shifts[key] || '';
      const isTod = isToday(d);
      html += `<td style="${isTod?'background:#1a1f00':''}">
        <input class="shift-input" 
          value="${val}" 
          placeholder="—"
          data-key="${key}"
          onchange="setShift('${key}', this.value)"
          style="width:64px">
      </td>`;
    });

    html += `<td>
      <button class="btn" style="font-size:11px;padding:4px 8px" onclick="editStaff('${s.id}')">編集</button>
      <button class="btn danger" style="font-size:11px;padding:4px 8px;margin-top:2px" onclick="removeStaff('${s.id}')">削除</button>
    </td></tr>`;
  });

  if (appData.staff.length === 0) {
    html += `<tr><td colspan="11" class="empty-hint">スタッフがいません。「＋ スタッフ追加」からどうぞ。</td></tr>`;
  }

  html += `</tbody></table></div>`;
  document.getElementById('main-content').innerHTML = html;
}

function renderStaff() {
  const weeks = getWeekList();
  let html = `
    <div class="staff-search-wrap">
      <input class="staff-search" type="text" id="staff-search-input" 
        placeholder="名前を入力..." oninput="renderStaffResult(this.value)">
    </div>
    <div id="staff-result"></div>`;
  document.getElementById('main-content').innerHTML = html;
}

function renderStaffResult(query) {
  const q = query.trim().toLowerCase();
  if (!q) { document.getElementById('staff-result').innerHTML = ''; return; }
  const found = appData.staff.filter(s => s.name.toLowerCase().includes(q));
  if (found.length === 0) {
    document.getElementById('staff-result').innerHTML = `<div class="empty-hint">「${query}」は見つかりません</div>`;
    return;
  }
  const s = found[0];
  const weeks = getWeekList();
  const DAY_LABELS = ['月','火','水','木','金','土','日'];

  let html = `<div class="staff-card">
    <h3>${s.name}</h3>
    ${s.requests ? `<p style="font-size:12px;color:var(--muted);margin-bottom:16px">休み希望: ${s.requests}</p>` : ''}`;

  weeks.forEach(monday => {
    const days = getWeekDays(monday);
    const hasAny = days.some(d => appData.shifts[shiftKey(s.id, d)]);
    if (!hasAny) return;
    const end = days[6];
    html += `<div class="staff-week">
      <h4>${fmtDate(monday)} 〜 ${fmtDate(end)}</h4>
      <div class="staff-days">`;
    days.forEach((d, i) => {
      const val = appData.shifts[shiftKey(s.id, d)] || '';
      const isTod = isToday(d);
      let badge = '';
      if (val === 'OFF') badge = `<span class="cell-off">OFF</span>`;
      else if (val && val !== '-') badge = `<span class="cell-shift">${val}:00〜</span>`;
      else badge = `<span style="color:var(--muted);font-size:12px">—</span>`;
      html += `<div class="staff-day${isTod?' today-row':''}">
        <span class="day-label">${DAY_LABELS[i]} ${fmtDate(d)}</span>
        ${badge}
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;
  document.getElementById('staff-result').innerHTML = html;
}

// ==================== ACTIONS ====================
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-admin').classList.toggle('active', mode === 'admin');
  document.getElementById('btn-staff').classList.toggle('active', mode === 'staff');
  render();
}

function prevWeek() {
  currentWeekStart = new Date(currentWeekStart);
  currentWeekStart.setDate(currentWeekStart.getDate() - 7);
  render();
}

function nextWeek() {
  currentWeekStart = new Date(currentWeekStart);
  currentWeekStart.setDate(currentWeekStart.getDate() + 7);
  render();
}

function goToday() {
  currentWeekStart = getThisMonday();
  render();
}

function gotoWeek(ms) {
  currentWeekStart = new Date(ms);
  render();
}

function setShift(key, value) {
  const v = value.trim().toUpperCase();
  if (v === '' || v === '—') delete appData.shifts[key];
  else appData.shifts[key] = v;
  saveData();
}

function openAddStaff() {
  editingStaffId = null;
  document.getElementById('modal-title').textContent = 'スタッフ追加';
  document.getElementById('input-name').value = '';
  document.getElementById('input-phone').value = '';
  document.getElementById('input-requests').value = '';
  document.getElementById('staff-modal').classList.add('open');
  setTimeout(() => document.getElementById('input-name').focus(), 50);
}

function editStaff(id) {
  editingStaffId = id;
  const s = appData.staff.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modal-title').textContent = 'スタッフ編集';
  document.getElementById('input-name').value = s.name;
  document.getElementById('input-phone').value = s.phone;
  document.getElementById('input-requests').value = s.requests;
  document.getElementById('staff-modal').classList.add('open');
}

function saveStaff() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { alert('名前を入力してください'); return; }
  const phone = document.getElementById('input-phone').value.trim();
  const requests = document.getElementById('input-requests').value.trim();

  if (editingStaffId) {
    const s = appData.staff.find(x => x.id === editingStaffId);
    if (s) { s.name = name; s.phone = phone; s.requests = requests; }
  } else {
    appData.staff.push({ id: 'u' + Date.now(), name, phone, requests });
  }
  saveData();
  closeModal();
  render();
}

function removeStaff(id) {
  if (!confirm('このスタッフを削除しますか？')) return;
  appData.staff = appData.staff.filter(s => s.id !== id);
  // Remove their shifts
  Object.keys(appData.shifts).forEach(k => { if (k.startsWith(id + '_')) delete appData.shifts[k]; });
  saveData();
  render();
}

function closeModal() {
  document.getElementById('staff-modal').classList.remove('open');
}

function exportCSV() {
  const weeks = getWeekList();
  const DAY_LABELS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
  let csv = 'NAME,PHONE,REQUESTS';
  
  // Header: collect all dates across all stored weeks that have data
  const allDates = [];
  weeks.forEach(monday => {
    getWeekDays(monday).forEach(d => allDates.push(d));
  });

  allDates.forEach(d => { csv += `,${fmtDateKey(d)}`; });
  csv += '\n';

  appData.staff.forEach(s => {
    csv += `"${s.name}","${s.phone}","${s.requests}"`;
    allDates.forEach(d => {
      const v = appData.shifts[shiftKey(s.id, d)] || '';
      csv += `,"${v}"`;
    });
    csv += '\n';
  });

  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `shifts_${fmtDateKey(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Close modal on overlay click
document.getElementById('staff-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ==================== INIT ====================
render();
</script>
